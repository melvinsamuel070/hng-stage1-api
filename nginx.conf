server {
    server_name melvinsam.duckdns.org;

    # Proxy all requests to Node.js app
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Keep your API endpoint if needed
    location /api {
        default_type application/json;
        return 200 '{"message":"HNGI14 Stage 0","track":"DevOps","username":"UgwuSamuelEbube"}';
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/melvinsam.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/melvinsam.duckdns.org/privkey.pem;
}

# Optional: Redirect HTTP to HTTPS
server {
    listen 80;
    server_name melvinsam.duckdns.org;
    return 301 https://$server_name$request_uri;
}
